<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RedRHex To Go</title>
    <link rel="stylesheet" href="./remote_styles.css?v=3.4-first-release" />
  </head>
  <body>
    <main id="app" class="remote-shell">
      <section class="panel loading-panel">
        <p class="eyebrow">BioRoLa ABAD RHex Team</p>
        <h1>RedRHex To Go</h1>
        <p>Loading the team training workspace.</p>
      </section>
    </main>
    <script type="module">
      import("./remote_app.js?v=3.4-first-release").catch((error) => {
        console.error("RedRHex child app failed to start", error);
        const app = document.querySelector("#app");
        if (!app) return;
        const panel = document.createElement("section");
        panel.className = "panel loading-panel";
        const eyebrow = document.createElement("p");
        eyebrow.className = "eyebrow";
        eyebrow.textContent = "BioRoLa ABAD RHex Team";
        const title = document.createElement("h1");
        title.textContent = "RedRHex To Go";
        const message = document.createElement("p");
        message.textContent = "The child app failed to start. Hard refresh this page, then check the browser console if it still appears.";
        const detail = document.createElement("pre");
        detail.textContent = error?.message || String(error);
        panel.append(eyebrow, title, message, detail);
        app.replaceChildren(panel);
      });
    </script>
    <script src="./welcome_refinement.js?v=3.4-first-release"></script>
    <script>
      // Fallback: if the module hasn't replaced the loading screen within 8 seconds,
      // show an actionable error instead of staying frozen on "Loading…" forever.
      // This runs as a plain script, independent of ES modules.
      (function () {
        var TIMEOUT_MS = 8000;
        var timer = setTimeout(function () {
          var app = document.querySelector("#app");
          if (!app) return;
          var text = app.textContent || "";
          if (text.indexOf("Loading the team training workspace") === -1) return; // app rendered OK
          app.innerHTML =
            '<section class="panel loading-panel">' +
            '<p class="eyebrow">BioRoLa ABAD RHex Team</p>' +
            '<h1>RedRHex To Go</h1>' +
            '<p>The app is taking too long to start.</p>' +
            '<p>Try a hard refresh: <strong>Ctrl + Shift + R</strong> (Windows/Linux) or <strong>Cmd + Shift + R</strong> (Mac). ' +
            'If the problem continues, check the browser console for error details.</p>' +
            '</section>';
        }, TIMEOUT_MS);
        // Cancel the fallback if the module boots successfully before the timeout.
        document.addEventListener("redrhex:booted", function () {
          clearTimeout(timer);
        });
      })();
    </script>
  </body>
</html>
